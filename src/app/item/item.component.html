<button (click)="createItem()">Criar</button>
<ul>
  <li style="margin-bottom: 8px" *ngFor="let item of items">
    <input type="text" name="title" [(ngModel)]="item.title" />
    <input type="checkbox" [(ngModel)]="item.done" />
    
    <button id="save" (click)="onSave(item)">Salvar</button>
    <button id="delete" (click)="deleteItem(item.id)">Apagar</button>
  </li>
</ul>
