<button id="create" (click)="createItem()">Criar</button>
<ul>
  <li *ngFor="let item of items">
    <input type="checkbox" [(ngModel)]="item.done" />
    <input type="text" [(ngModel)]="item.title" />
    <button id="delete" (click)="deleteItem(item.id)">Apagar</button>
  </li>
</ul>
<button id="save" (click)="onSave(items)" *ngIf="items.length !== 0">
  Salvar
</button>
